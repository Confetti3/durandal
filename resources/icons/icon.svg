<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Durandal ASCII-style icon: pixel-sword on terminal background -->
  <rect width="256" height="256" rx="32" fill="#0c0c0c"/>
  
  <!-- ASCII grid cells forming a sword -->
  <!-- Blade (bright cyan #00ffff) -->
  <rect x="120" y="20" width="16" height="16" fill="#00ffff"/> <!-- tip -->
  <rect x="112" y="36" width="32" height="16" fill="#00ffff"/>
  <rect x="112" y="52" width="32" height="16" fill="#00ffff"/>
  <rect x="112" y="68" width="32" height="16" fill="#00ffff"/>
  <rect x="112" y="84" width="32" height="16" fill="#00ffff"/>
  <rect x="112" y="100" width="32" height="16" fill="#00ffff"/>
  <rect x="112" y="116" width="32" height="16" fill="#00ffff"/>
  <rect x="112" y="132" width="32" height="16" fill="#00ffff"/>
  
  <!-- Fuller (blood groove, darker cyan #008b8b) -->
  <rect x="120" y="52" width="16" height="16" fill="#008b8b"/>
  <rect x="120" y="68" width="16" height="16" fill="#008b8b"/>
  <rect x="120" y="84" width="16" height="16" fill="#008b8b"/>
  <rect x="120" y="100" width="16" height="16" fill="#008b8b"/>
  <rect x="120" y="116" width="16" height="16" fill="#008b8b"/>
  
  <!-- Crossguard (golden #ffd700) -->
  <rect x="72" y="148" width="112" height="16" fill="#ffd700"/>
  <rect x="88" y="132" width="16" height="16" fill="#ffd700"/>
  <rect x="152" y="132" width="16" height="16" fill="#ffd700"/>
  
  <!-- Guard details -->
  <rect x="56" y="148" width="16" height="16" fill="#daa520"/>
  <rect x="184" y="148" width="16" height="16" fill="#daa520"/>
  
  <!-- Hilt / Grip (dark gray #4a4a4a) -->
  <rect x="120" y="164" width="16" height="16" fill="#6e7681"/>
  <rect x="120" y="180" width="16" height="16" fill="#6e7681"/>
  <rect x="120" y="196" width="16" height="16" fill="#6e7681"/>
  
  <!-- Pommel (ruby red #dc143c) -->
  <rect x="112" y="212" width="32" height="16" fill="#dc143c"/>
  <rect x="120" y="228" width="16" height="16" fill="#b22222"/>
  
  <!-- Subtle terminal cursor block at tip for editor feel -->
  <rect x="120" y="20" width="16" height="16" fill="#00ffff" opacity="0.9"/>
</svg>
